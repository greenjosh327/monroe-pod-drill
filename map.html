<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">

<title>Monroe County POD Web Map</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

html, body {
    height:100%;
    margin:0;
}

#map {
    width:100%;
    height:100%;
}

.legend {
    background:white;
    padding:10px;
}

</style>

</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([41.0,-75.4],10);

var osm = L.tileLayer(
'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19,
attribution:'© OpenStreetMap'
}
).addTo(map);

var servedLayer = L.layerGroup();
var unservedLayer = L.layerGroup();
var podLayer = L.layerGroup();

fetch('served.geojson')
.then(r => r.json())
.then(data => {

    var layer = L.geoJSON(data,{
        style:{
            color:'#008000',
            weight:1,
            fillOpacity:0.35
        }
    });

    layer.addTo(servedLayer);
    servedLayer.addTo(map);

});

fetch('unserved.geojson')
.then(r => r.json())
.then(data => {

    var layer = L.geoJSON(data,{
        style:{
            color:'#cc0000',
            weight:1,
            fillOpacity:0.35
        }
    });

    layer.addTo(unservedLayer);
    unservedLayer.addTo(map);

});

fetch('pod_sites.geojson')
.then(r => r.json())
.then(data => {

    var layer = L.geoJSON(data,{
        pointToLayer:function(feature,latlng){

            return L.circleMarker(latlng,{
                radius:8,
                color:'blue',
                fillColor:'blue',
                fillOpacity:1
            });

        },

        onEachFeature:function(feature,layer){

            let name = "POD Site";

            if(feature.properties){
                if(feature.properties.NAME)
                    name = feature.properties.NAME;
            }

            layer.bindPopup(name);
        }

    });

    layer.addTo(podLayer);
    podLayer.addTo(map);

});

L.control.layers(
{
    "OpenStreetMap":osm
},
{
    "Served Areas":servedLayer,
    "Unserved Areas":unservedLayer,
    "POD Sites":podLayer
}
).addTo(map);

</script>

</body>
</html>
